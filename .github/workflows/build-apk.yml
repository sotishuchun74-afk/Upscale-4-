import zipfile, pickle, io, struct
import numpy as np

path = '/mnt/user-data/uploads/realesr-animevideov3__1_.pth'
z = zipfile.ZipFile(path)

storages = {}

class FakeStorage:
    def __init__(self, dtype, key, size, location):
        self.dtype = dtype
        self.key = key
        self.size = size
        self.location = location

def persistent_load(saved_id):
    typename = saved_id[0]
    assert typename == 'storage'
    storage_type, key, location, numel = saved_id[1], saved_id[2], saved_id[3], saved_id[4]
    dtype_map = {
        'FloatStorage': np.float32,
        'DoubleStorage': np.float64,
        'HalfStorage': np.float16,
        'LongStorage': np.int64,
        'IntStorage': np.int32,
    }
    dtype = dtype_map.get(storage_type.__name__ if hasattr(storage_type,'__name__') else str(storage_type), np.float32)
    return FakeStorage(dtype, key, numel, location)

class RebuildTensor:
    pass

def rebuild_tensor_v2(storage, storage_offset, size, stride, requires_grad, backward_hooks, metadata=None):
    raw = z.read(f'archive/data/{storage.key}')
    arr = np.frombuffer(raw, dtype=storage.dtype)
    arr = arr[storage_offset:storage_offset+int(np.prod(size))] if size else arr
    if size:
        arr = arr.reshape(size)
    return arr

class FakeUnpickler(pickle.Unpickler):
    def find_class(self, module, name):
        if module == 'torch._utils' and name == '_rebuild_tensor_v2':
            return rebuild_tensor_v2
        if module == 'torch' and name.endswith('Storage'):
            return type(name, (), {'__name__': name})
        if module == 'collections' and name == 'OrderedDict':
            return dict
        if module == 'torch._utils' and name == '_rebuild_parameter':
            def rebuild_param(data, requires_grad, backward_hooks):
                return data
            return rebuild_param
        # fallback: return a dummy class
        return type(name, (), {})

    def persistent_load(self, pid):
        return persistent_load(pid)

data = z.read('archive/data.pkl')
up = FakeUnpickler(io.BytesIO(data))
obj = up.load()
print(type(obj))
if isinstance(obj, dict):
    keys = list(obj.keys())
    print('num keys:', len(keys))
    for k in keys:
